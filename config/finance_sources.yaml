version: 1
description: >
  Data sources for clawdbot to collect real-time financial news covering Taiwan and global markets.
  Designed for RSS-first, API-optional, with deduplication and weighting.

# =========================
# Global Settings
# =========================
global:
  default_time_window_hours: 5
  language_priority:
    - zh-TW
    - zh
    - en
  deduplication:
    method: hybrid
    rules:
      - type: exact_url
      - type: title_similarity
        threshold: 0.9
      - type: same_entities
        window_hours: 24

# =========================
# Taiwan Financial News
# =========================
taiwan:
  tier1_core:
    description: "High-reliability Taiwan financial news"
    sources:
      - id: cna_finance
        name: 中央社－財經
        type: rss
        url: https://feeds.feedburner.com/rsscna/finance
        language: zh-TW
        weight: 0.7
        tags: [taiwan, finance, macro]
      - id: cna_stock
        name: 中央社－證券
        type: rss
        url: https://feeds.feedburner.com/rsscna/finance
        language: zh-TW
        weight: 0.7
        tags: [taiwan, stocks, equities]
  tier2_supplement:
    description: "Supplementary Taiwan news via aggregation"
    sources:
      - id: yahoo_stock_tw_market
        name: Yahoo股市 RSS－台股動態
        type: rss
        url: https://tw.stock.yahoo.com/rss?category=tw-market
        language: zh-TW
        weight: 0.8
        tags: [taiwan, stocks, yahoo]
      - id: yahoo_stock_news
        name: Yahoo股市 RSS－最新新聞
        type: rss
        url: https://tw.stock.yahoo.com/rss?category=news
        language: zh-TW
        weight: 0.8
        tags: [taiwan, finance, yahoo]
      - id: google_news_tw_markets
        name: Google News Taiwan AI Markets
        type: rss
        query: "AI OR 人工智慧 OR 生成式AI OR 算力 OR GPU OR HBM OR AI伺服器 OR 資料中心 OR 半導體 OR 晶片 OR 先進封裝 OR CoWoS OR ASIC OR 矽光子 OR CPO OR 光通訊 OR 機器人 台股 OR 台積電 OR 聯發科 OR 廣達 OR 緯創 OR 緯穎 OR 鴻海 OR 奇鋐 OR 雙鴻 OR 世芯"
        url_template: "https://news.google.com/rss/search?q={query}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant"
        language: zh-TW
        weight: 1.2
        tags: [taiwan, aggregated, ai]
      - id: google_news_tw_stock_market
        name: Google News Taiwan Stock Market
        type: rss
        query: "台股 OR 台灣股市 OR 加權指數 OR 櫃買 OR 三大法人 OR 外資 買超 OR 權值股 OR 法說 OR 營收 OR 金融股 OR 航運股 OR 觀光股 OR 電子股 OR 傳產 OR ETF OR 匯率 OR 央行 OR 景氣 OR 台積電 OR 聯發科 OR 鴻海 OR 台達電"
        url_template: "https://news.google.com/rss/search?q={query}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant"
        language: zh-TW
        weight: 1.0
        tags: [taiwan, aggregated, stocks]

# =========================
# Global Financial News
# =========================
global_markets:
  tier1_core:
    description: "Authoritative global financial news"
    sources:
      - id: reuters_markets
        name: Reuters - Global Markets
        type: rss
        url: https://www.reuters.com/rssFeed/globalMarketsNews
        language: en
        weight: 0.7
        tags: [global, markets, macro]
      - id: nikkei_asia
        name: Nikkei Asia
        type: rss
        url: https://asia.nikkei.com/rss/feed/nar
        language: en
        weight: 0.7
        tags: [asia, markets, equities]
  tier2_supplement:
    description: "Broad global coverage via aggregation"
    sources:
      - id: google_news_global_markets
        name: Google News Global AI Markets
        type: rss
        query: "AI OR artificial intelligence OR generative AI OR GPU OR HBM OR data center OR AI server OR semiconductor OR chips OR accelerator OR ASIC OR silicon photonics OR CPO OR inference OR robotics OR Nvidia OR AMD OR Broadcom OR Microsoft OR OpenAI OR Google OR Amazon OR Meta OR TSMC"
        url_template: "https://news.google.com/rss/search?q={query}&hl=en-US&gl=US&ceid=US:en"
        language: en
        weight: 1.2
        tags: [global, aggregated, ai]

# =========================
# Optional API-based Sources
# =========================
apis:
  enabled: false # set true only if API key is configured
  sources:
    - id: newsapi_everything
      name: NewsAPI Everything
      type: api
      provider: newsapi
      endpoint: /v2/everything
      params:
        q: "markets OR economy OR inflation OR central bank"
        language: en
        sortBy: publishedAt
      weight: 0.5
      tags: [global, api]
    - id: gdelt_events
      name: GDELT Events
      type: api
      provider: gdelt
      endpoint: events
      params:
        themes: [ECON_INFLATION, ECON_INTEREST_RATE, ECON_STOCK_MARKET]
        timespan_hours: 24
      weight: 0.4
      tags: [global, trends, api]

# =========================
# Output Preferences
# =========================
output:
  max_items_per_region:
    taiwan: 8
    global: 8
  fields:
    - headline
    - key_entities
    - link
  final_sections:
    - title_and_link
